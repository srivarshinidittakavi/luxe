<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE STORE — Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2; --dark: #1A1612; --warm: #C8A97E;
    --accent: #8B4513; --mid: #6B5B45; --light: #EDE8DF;
    --white: #FFFFFF; --red: #C0392B; --green: #27AE60;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); }

  nav { background: var(--dark); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 70px; position: sticky; top: 0; z-index: 1000; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: var(--warm); letter-spacing: 3px; text-decoration: none; }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { color: var(--cream); text-decoration: none; font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--warm); }
  .cart-btn { background: var(--warm); color: var(--dark); border: none; padding: 10px 20px; border-radius: 30px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .cart-count { background: var(--dark); color: var(--warm); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }

  .steps { display: flex; align-items: center; justify-content: center; padding: 30px 40px 10px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .step-num { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--light); background: white; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; color: #ccc; }
  .step.active .step-num { background: var(--warm); border-color: var(--warm); color: var(--dark); }
  .step.done .step-num { background: var(--green); border-color: var(--green); color: white; }
  .step-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }
  .step.active .step-label { color: var(--warm); font-weight: 600; }
  .step-line { flex: 1; height: 2px; background: var(--light); max-width: 80px; margin: 0 8px; margin-bottom: 22px; }
  .step-line.done { background: var(--green); }

  .back-btn { background: none; border: none; color: var(--mid); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin: 16px 0 4px 40px; transition: color 0.2s; text-decoration: none; }
  .back-btn:hover { color: var(--dark); }

  .checkout-container { max-width: 1000px; margin: 0 auto; padding: 30px 40px 80px; display: grid; grid-template-columns: 1fr 360px; gap: 40px; align-items: start; }

  .form-section { background: white; border-radius: 18px; padding: 36px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); margin-bottom: 24px; }
  .form-section h3 { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 22px; color: var(--dark); display: flex; align-items: center; gap: 10px; }
  .form-section h3 .num { background: var(--warm); color: var(--dark); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }

  .form-grid { display: grid; gap: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--mid); margin-bottom: 7px; }
  input[type="text"], input[type="email"], input[type="tel"], select {
    width: 100%; border: 1.5px solid var(--light); border-radius: 10px; padding: 12px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--dark);
    background: var(--cream); transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  input:focus, select:focus { border-color: var(--warm); box-shadow: 0 0 0 3px rgba(200,169,126,0.2); background: white; }
  input.error { border-color: var(--red) !important; }
  .field-error { color: var(--red); font-size: 0.75rem; margin-top: 4px; display: none; }
  .field-error.show { display: block; }

  .payment-options { display: grid; gap: 12px; }
  .payment-option { border: 1.5px solid var(--light); border-radius: 12px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
  .payment-option:hover { border-color: var(--warm); background: rgba(200,169,126,0.05); }
  .payment-option.selected { border-color: var(--warm); background: rgba(200,169,126,0.1); }
  .payment-option input[type="radio"] { accent-color: var(--warm); }
  .payment-option label { cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--dark); text-transform: none; letter-spacing: 0; margin: 0; }
  .payment-logo { margin-left: auto; font-size: 0.7rem; font-weight: 700; background: var(--light); padding: 3px 8px; border-radius: 4px; color: var(--mid); }
  .card-icons { display: flex; gap: 8px; margin-bottom: 14px; }
  .card-icon { background: var(--light); border-radius: 6px; padding: 4px 10px; font-size: 0.7rem; font-weight: 700; color: var(--mid); }

  .place-order-btn { width: 100%; background: var(--dark); color: var(--cream); border: none; padding: 18px; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
  .place-order-btn:hover { background: var(--warm); color: var(--dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,22,18,0.2); }
  .place-order-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  .mini-summary { background: var(--dark); color: var(--cream); border-radius: 18px; padding: 26px; position: sticky; top: 90px; }
  .mini-summary h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--warm); margin-bottom: 20px; }
  .mini-item { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #2A2520; }
  .mini-item-img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: #333; flex-shrink: 0; }
  .mini-item-info { flex: 1; }
  .mini-item-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; }
  .mini-item-qty { font-size: 0.75rem; color: #888; }
  .mini-item-price { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--warm); white-space: nowrap; }
  .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.88rem; color: #9A8F82; }
  .summary-row.total { border-top: 1px solid #333; padding-top: 14px; margin-top: 6px; font-size: 1.05rem; font-weight: 700; color: var(--cream); font-family: 'Playfair Display', serif; }

  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--dark); color: var(--cream); padding: 14px 22px; border-radius: 12px; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 9999; transform: translateY(100px); opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .toast.show { transform: translateY(0); opacity: 1; }

  footer { background: #0F0C0A; color: #666; text-align: center; padding: 24px; font-size: 0.82rem; }
  footer span { color: var(--warm); }

  .empty-notice { text-align: center; padding: 80px 40px; }
  .empty-notice h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 14px; }
  .empty-notice p { color: var(--mid); margin-bottom: 28px; }
  .shop-btn { background: var(--dark); color: var(--cream); padding: 14px 32px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.95rem; text-decoration: none; display: inline-block; }

  @media (max-width: 768px) {
    .checkout-container { grid-template-columns: 1fr; padding: 20px; }
    .form-row { grid-template-columns: 1fr; }
    nav { padding: 0 20px; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>
 <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K4QF9K7K"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<nav>
  <a class="logo" href="index.html">LUXE</a>
  <ul class="nav-links">
    <li><a href="index.html">Shop</a></li>
    <li><a href="index.html">Collections</a></li>
    <li><a href="index.html">About</a></li>
  </ul>
  <a class="cart-btn" href="cart.html">🛍 Cart <span class="cart-count" id="cartCount">0</span></a>
</nav>

<a class="back-btn" href="cart.html">← Back to Cart</a>

<div class="steps">
  <div class="step done"><div class="step-num">✓</div><div class="step-label">Shop</div></div>
  <div class="step-line done"></div>
  <div class="step done"><div class="step-num">✓</div><div class="step-label">Cart</div></div>
  <div class="step-line done"></div>
  <div class="step active"><div class="step-num">3</div><div class="step-label">Checkout</div></div>
  <div class="step-line"></div>
  <div class="step"><div class="step-num">4</div><div class="step-label">Confirm</div></div>
</div>

<div id="mainContent"></div>

<footer>© 2026 <span>LUXE STORE</span>. All rights reserved.</footer>
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
let paymentMethod = 'card';

function getCart() { try { return JSON.parse(localStorage.getItem('luxe_cart') || '[]'); } catch { return []; } }

function updateCartCount() {
  const cart = getCart();
  document.getElementById('cartCount').textContent = cart.reduce((s,i) => s+i.qty, 0);
}

function renderPage() {
  const cart = getCart();
  const main = document.getElementById('mainContent');

  if (cart.length === 0) {
    main.innerHTML = `<div class="empty-notice"><h3>Your cart is empty</h3><p>Add some items before checking out.</p><a class="shop-btn" href="index.html">Go Shopping →</a></div>`;
    return;
  }

  const subtotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const shipping = subtotal >= 999 ? 0 : 99;
  const tax = Math.round(subtotal * 0.18);
  const total = subtotal + shipping + tax;

  main.innerHTML = `
  <div class="checkout-container">
    <div>
      <div class="form-section">
        <h3><span class="num">1</span> Contact & Shipping</h3>
        <div class="form-grid">
          <div class="form-row">
            <div>
              <label>First Name</label>
              <input type="text" id="firstName" placeholder="Arjun">
              <div class="field-error" id="err-firstName">First name is required</div>
            </div>
            <div>
              <label>Last Name</label>
              <input type="text" id="lastName" placeholder="Sharma">
              <div class="field-error" id="err-lastName">Last name is required</div>
            </div>
          </div>
          <div>
            <label>Email Address</label>
            <input type="email" id="email" placeholder="arjun@example.com">
            <div class="field-error" id="err-email">Valid email is required</div>
          </div>
          <div>
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+91 98765 43210">
            <div class="field-error" id="err-phone">Phone number is required</div>
          </div>
          <div>
            <label>Address Line 1</label>
            <input type="text" id="address" placeholder="123 MG Road, Apartment 4B">
            <div class="field-error" id="err-address">Address is required</div>
          </div>
          <div class="form-row">
            <div>
              <label>City</label>
              <input type="text" id="city" placeholder="Hyderabad">
              <div class="field-error" id="err-city">City is required</div>
            </div>
            <div>
              <label>State</label>
              <select id="state">
                <option value="">Select State</option>
                <option>Andhra Pradesh</option><option>Telangana</option>
                <option>Karnataka</option><option>Tamil Nadu</option>
                <option>Maharashtra</option><option>Delhi</option>
                <option>Gujarat</option><option>Rajasthan</option>
                <option>West Bengal</option><option>Kerala</option>
                <option>Other</option>
              </select>
              <div class="field-error" id="err-state">State is required</div>
            </div>
          </div>
          <div>
            <label>PIN Code</label>
            <input type="text" id="pincode" placeholder="500001" maxlength="6">
            <div class="field-error" id="err-pincode">Valid 6-digit PIN code is required</div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3><span class="num">2</span> Payment Method</h3>
        <div class="payment-options">
          <div class="payment-option selected" onclick="selectPayment(this,'card')">
            <input type="radio" name="payment" checked> <label>Credit / Debit Card</label>
            <span class="payment-logo">💳 CARD</span>
          </div>
          <div class="payment-option" onclick="selectPayment(this,'upi')">
            <input type="radio" name="payment"> <label>UPI Payment</label>
            <span class="payment-logo">📱 UPI</span>
          </div>
          <div class="payment-option" onclick="selectPayment(this,'cod')">
            <input type="radio" name="payment"> <label>Cash on Delivery</label>
            <span class="payment-logo">💵 COD</span>
          </div>
        </div>

        <div id="card-fields" style="margin-top:20px;">
          <div class="card-icons">
            <span class="card-icon">VISA</span><span class="card-icon">MC</span>
            <span class="card-icon">AMEX</span><span class="card-icon">RUPAY</span>
          </div>
          <div class="form-grid">
            <div>
              <label>Card Number</label>
              <input type="text" id="cardNum" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)">
              <div class="field-error" id="err-cardNum">Valid 16-digit card number is required</div>
            </div>
            <div class="form-row">
              <div>
                <label>Expiry Date</label>
                <input type="text" id="cardExp" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
                <div class="field-error" id="err-cardExp">Expiry date is required</div>
              </div>
              <div>
                <label>CVV</label>
                <input type="text" id="cardCvv" placeholder="•••" maxlength="3">
                <div class="field-error" id="err-cardCvv">3-digit CVV required</div>
              </div>
            </div>
            <div>
              <label>Name on Card</label>
              <input type="text" id="cardName" placeholder="ARJUN SHARMA">
              <div class="field-error" id="err-cardName">Cardholder name is required</div>
            </div>
          </div>
        </div>

        <div id="upi-fields" style="display:none;margin-top:20px;">
          <label>UPI ID</label>
          <input type="text" id="upiId" placeholder="yourname@upi or yourname@okaxis">
          <div class="field-error" id="err-upiId">Valid UPI ID is required (e.g. name@upi)</div>
        </div>

        <div id="cod-fields" style="display:none;margin-top:20px;">
          <p style="background:var(--light);padding:16px;border-radius:12px;font-size:0.88rem;color:var(--mid);line-height:1.6;">
            💵 You'll pay <strong>cash at the time of delivery</strong>.<br>
            Please keep exact change ready. An additional <strong>₹40 COD handling fee</strong> will be added.
          </p>
        </div>
      </div>

      <button class="place-order-btn" id="orderBtn" onclick="placeOrder()">🔒 Place Order Securely</button>
    </div>

    <div class="mini-summary">
      <h3>Your Order</h3>
      ${cart.map(item => `
        <div class="mini-item">
          <img class="mini-item-img" src="${item.img}" alt="${item.name}">
          <div class="mini-item-info">
            <div class="mini-item-name">${item.name}</div>
            <div class="mini-item-qty">Qty: ${item.qty}</div>
          </div>
          <div class="mini-item-price">₹${(item.price * item.qty).toLocaleString()}</div>
        </div>`).join('')}
      <div class="summary-row" style="margin-top:16px;"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
      <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'FREE' : '₹' + shipping}</span></div>
      <div class="summary-row"><span>GST (18%)</span><span>₹${tax.toLocaleString()}</span></div>
      <div class="summary-row total"><span>Total</span><span style="color:var(--warm)">₹${total.toLocaleString()}</span></div>
      <p style="font-size:0.75rem;color:#555;margin-top:16px;text-align:center;">🔒 Your payment info is encrypted & secure</p>
    </div>
  </div>`;
}

function selectPayment(el, method) {
  document.querySelectorAll('.payment-option').forEach(o => { o.classList.remove('selected'); o.querySelector('input').checked = false; });
  el.classList.add('selected');
  el.querySelector('input').checked = true;
  paymentMethod = method;
  document.getElementById('card-fields').style.display = method === 'card' ? 'block' : 'none';
  document.getElementById('upi-fields').style.display = method === 'upi' ? 'block' : 'none';
  document.getElementById('cod-fields').style.display = method === 'cod' ? 'block' : 'none';
}

function formatCard(input) {
  let val = input.value.replace(/\D/g, '').substring(0, 16);
  input.value = val.replace(/(.{4})/g, '$1 ').trim();
}

function formatExpiry(input) {
  let val = input.value.replace(/\D/g, '').substring(0, 4);
  if (val.length >= 2) val = val.substring(0,2) + '/' + val.substring(2);
  input.value = val;
}

function validateField(id, condFn) {
  const el = document.getElementById(id);
  const err = document.getElementById('err-' + id);
  if (!el) return true;
  const ok = condFn(el.value);
  if (!ok) { el.classList.add('error'); if (err) err.classList.add('show'); }
  else { el.classList.remove('error'); if (err) err.classList.remove('show'); }
  return ok;
}

function placeOrder() {
  let valid = true;
  valid = validateField('firstName', v => v.trim().length > 1) && valid;
  valid = validateField('lastName', v => v.trim().length > 1) && valid;
  valid = validateField('email', v => /^[^@]+@[^@]+\.[^@]+$/.test(v)) && valid;
  valid = validateField('phone', v => v.replace(/\D/g,'').length >= 10) && valid;
  valid = validateField('address', v => v.trim().length > 3) && valid;
  valid = validateField('city', v => v.trim().length > 1) && valid;
  valid = validateField('state', v => v !== '') && valid;
  valid = validateField('pincode', v => /^\d{6}$/.test(v)) && valid;

  if (paymentMethod === 'card') {
    valid = validateField('cardNum', v => v.replace(/\s/g,'').length === 16) && valid;
    valid = validateField('cardExp', v => /^\d{2}\/\d{2}$/.test(v)) && valid;
    valid = validateField('cardCvv', v => /^\d{3}$/.test(v)) && valid;
    valid = validateField('cardName', v => v.trim().length > 1) && valid;
  } else if (paymentMethod === 'upi') {
    valid = validateField('upiId', v => /^[\w.\-_]+@[\w]+$/.test(v)) && valid;
  }

  if (!valid) { showToast('⚠ Please fix the highlighted errors'); return; }

  const btn = document.getElementById('orderBtn');
  btn.textContent = '⏳ Processing your order...';
  btn.disabled = true;

  setTimeout(() => {
    const orderNum = 'LX-' + Math.floor(10000 + Math.random() * 90000);
    localStorage.setItem('luxe_last_order', orderNum);
    localStorage.removeItem('luxe_cart');
    window.location.href = 'success.html';
  }, 2200);
}

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.style.background = '#C0392B';
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
}

renderPage();
updateCartCount();
</script>
</body>
</html>
